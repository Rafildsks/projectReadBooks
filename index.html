<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadBooks</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="h-screen">
    <main class="h-screen flex">
        <div class="relative w-1/2 bg-[url('./img/biblioteca.jpg')] bg-cover bg-center">
            <div class="absolute w-full bg-linear-to-b from-[rgba(68,68,68,0.16)] to-black h-screen"></div>
            <h1 class="absolute p-5 py-20 text-6xl text-[#006970] font-bold">ReadBooks</h1>
        </div>
        <div class="flex flex-col items-center pt-20 w-1/2">
            <<span id="span-loading" class="animate__animated animate__rotateIn animate__infinite">
                <i class="fa-solid fa-spinner text-4xl"></i>
            </span>
            <div></div>
            <div class="bg-[#E7E8E9] w-[48%] p-1 rounded-md">
                <button id="btn-login" class="bg-[#006970] text-white px-15 py-2 rounded-lg">Login</button>
                <button id="btn-cadastro" class="px-15 py-2 rounded-lg">Criar conta</button>
            </div>
            <div class="w-[70%]">
                <h2 id="titulo-form" class="text-2xl pt-3">Iniciar sessão</h2>
                <p id="descricao-form">Insira seus dados para acessar sua estante</p>
            </div>
            <form onsubmit="handleLogin(event)" id="form-login" class="py-5 w-[70%]">
                <div>
                    <label for="emailLogin">Email</label>
                    <input placeholder="email@readbooks.com" type="email" name="email" id="emailLogin"
                        class="w-full border border-[#d9d9db] p-2 rounded-md mt-2">
                </div>
                <div id="div-senha">
                    <label for="senhaLogin">Senha</label>
                    <input placeholder="****" type="password" name="senha" id="senhaLogin"
                        class="w-full border border-[#d9d9db] p-2 rounded-md mt-2">
                </div>
                <div class="flex justify-between mt-3">
                    <div>
                        <input type="checkbox">
                        <label for="">Mantenha-me logado</label>
                    </div>
                    <a href="#esqueceu-senha">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="bg-[#006970] px-15 py-2 rounded-lg w-full text-white mt-5">Entrar</button>
            </form>
            <form onsubmit="handleCadastro(event)" id="form-cadastro" class="hidden py-5 w-[70%]">
                <div>
                    <label for="nome">Nome</label>
                    <input placeholder="Usuário" name="nome" id="nome"
                        class="w-full border border-[#d9d9db] p-2 rounded-md mt-2">
                </div>
                <div>
                    <label for="emailCadastro">Email</label>
                    <input placeholder="email@readbooks.com" name="email" id="emailCadastro"
                        class="w-full border border-[#d9d9db] p-2 rounded-md mt-2">
                </div>
                <div>
                    <label for="senhaCadastro">Senha</label>
                    <input placeholder="Exemplo: 1234" type="password" name="senha" id="senhaCadastro"
                        class="w-full border border-[#d9d9db] p-2 rounded-md mt-2">
                </div>
                <button type="submit"
                    class="bg-[#006970] px-15 py-2 rounded-lg w-full text-white mt-5">Cadastrar</button>
            </form>
            <p class="text-center mt-40"> &copy; Todos os direitos reservados. 2026</p>
        </div>
        <div id="div-alert" class="absolute bg-amber-200 py-8 px-5 rounded-2xl bottom-5 right-5 border-4 border-amber-300"></div>
    </main>
    <script src="index.js"></script>
</body>
</html>
