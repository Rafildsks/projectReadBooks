  <!DOCTYPE html>
  <html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadBooks</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <header class="flex items-center justify-between p-5 border-b border-gray-200">  
      <h1 class=" text-2xl text-[#006970] font-bold">ReadBooks</h1>
      <form onsubmit="getBooks(event)" class="bg-[#f5f5f5] rounded-md w-1/3 flex justify-between">
        <input class="w-full p-2" type="text" name="busca" id="busca-input" placeholder="Busca por livro, autor..">
        <button class="pr-2" type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
      <span id="span-usuario"></span>
      <button type="button" onclick="handleLogout()" class="text-[#006970] font-bold">Sair <i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      </header>
    <main>
      <section id="resultado-pesquisa" class="grid grid-cols-2 md:grid-cols-4 gap-10 m-20 justify-items-center">
      </section>
      <section class="m-30">
        <h2 class="text-2xl font-bold text-[#006970] mb-5">Meta de Leitura</h2>
        <div id="div-meta" class="grid grid-cols-7 gap-10"></div>
      </section>
    </main>
    <script src="dashboard.js"></script>
  </body>
  </html>
